name: Build and publish firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-firmware-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to Vercel Blob
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out firmware
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: 1.4.1

      - name: Cache Arduino dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: arduino-${{ runner.os }}-esp32-3.3.7-lvgl-8.3.11

      - name: Install ESP32 core and libraries
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7
          arduino-cli lib install lvgl@8.3.11
          arduino-cli lib install ESP32_Display_Panel@1.0.0
          arduino-cli lib install ESP32_IO_Expander@1.0.1
          arduino-cli lib install esp-lib-utils@0.1.2

      - name: Build merged firmware image
        run: make build OUTPUT_DIR="${{ runner.temp }}/firmware"

      - name: Resolve firmware version and image
        id: release
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="1.0.${GITHUB_RUN_NUMBER}-${short_sha}"
          firmware_file="$(find "${RUNNER_TEMP}/firmware" -maxdepth 1 -name '*.merged.bin' -print -quit)"

          if [[ -z "${firmware_file}" ]]; then
            echo "Arduino did not produce a merged firmware image" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "firmware_file=${firmware_file}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install publisher dependencies
        run: npm ci

      - name: Publish firmware and latest metadata
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          FIRMWARE_FILE: ${{ steps.release.outputs.firmware_file }}
          FIRMWARE_VERSION: ${{ steps.release.outputs.version }}
        run: npm run publish-firmware

      - name: Upload firmware build artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcmind-life-counter-${{ steps.release.outputs.version }}
          path: ${{ steps.release.outputs.firmware_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Add release summary
        run: |
          {
            echo "## ArcMind Life Counter firmware"
            echo
            echo "- Version: \`${{ steps.release.outputs.version }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Published: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "${GITHUB_STEP_SUMMARY}"
